version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fabric_erp_db
    environment:
      POSTGRES_DB: ${DB_NAME:-fabric_erp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fabric_erp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fabric_erp_redis
    ports:
      - "6379:6379"
    networks:
      - fabric_erp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fabric_erp_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fabric_erp_network

  celery:
    build: .
    container_name: fabric_erp_celery
    command: celery -A core worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
    networks:
      - fabric_erp_network

  celery-beat:
    build: .
    container_name: fabric_erp_celery_beat
    command: celery -A core beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
    networks:
      - fabric_erp_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  fabric_erp_network:
    driver: bridge