{% extends 'base.html' %}

{% block title %}Delete User - FabricERP{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-danger">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                    <h3 class="mt-3 text-danger">Confirm Delete</h3>
                    <p class="text-muted">
                        Are you sure you want to delete user <strong>{{ user.full_name }}</strong>?
                        This action cannot be undone.
                    </p>
                    <div class="d-grid gap-2">
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger w-100">Delete User</button>
                        </form>
                        <a href="{% url 'authentication:user_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
