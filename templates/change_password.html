{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password - FabricERP{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <h3 class="text-center">Change Password</h3>
                    <p class="text-muted text-center">Update your password securely</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100">Change Password</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'authentication:dashboard' %}" class="text-decoration-none">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
