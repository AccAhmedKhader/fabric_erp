{% extends 'base.html' %}

{% block title %}Account Locked - FabricERP{% endblock %}

{% block content %}
<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-5 text-center">
            <i class="bi bi-lock-fill text-danger" style="font-size: 4rem;"></i>
            <h3 class="mt-3">Account Locked</h3>
            <p class="text-muted">
                Your account has been locked due to too many failed login attempts.
                Please try again after 15 minutes or contact support.
            </p>
            <a href="{% url 'authentication:login' %}" class="btn btn-primary">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
