{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Login - FabricERP{% endblock %}

{% block content %}
<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="{% static 'images/logo.png' %}" alt="FabricERP" height="60">
                <h3 class="mt-2">Welcome Back</h3>
                <p class="text-muted">Login to your account</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'authentication:forgot_password' %}" class="text-decoration-none">Forgot Password?</a>
            </div>
            <hr>
            <p class="text-center text-muted small">Version {{ app_version }} | {{ environment }}</p>
        </div>
    </div>
</div>
{% endblock %}
